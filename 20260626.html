<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>HTML 첫 날</title>
</head>

<body>
    <!--br은 줄바꿈-->
    안녕하세요.<br />
    저는 유이라 입니다.<br />
    /ᐠ.🝦 ̫ 🝦マ<br />

    <!--img는 이미지 삽입-->
    <img src="https://www.cosmopolitan.co.kr/resources/online/online_image/2026/06/05/5a5304a7-588d-4de5-88d0-528464fcc44c.jpg"
        alt="갸루귀신 리센느 미나미" width="600px"/><br />
    <!--절대경로와 상대경로 (풀 디렉토리 vs "내 기준으로") html보다 위에있는 폴더의 경우는 "../" 사용-->
    <img src="./img/plush.png" alt="plush doll boy" width="600px"/><br />
    <!--ul과 li는 세트, li만 쓸 수 없음-->
    <ul>
        <li>
            <a href="https://www.naver.com">네이버</a>
        </li>
        <li>
            <a href="https://www.google.com">구글</a>
        </li>
        <li>
            <a href="https://www.daum.net">다음</a>
        </li>
    </ul>

    <!--a는 하이퍼링크 (제일 중요하게 쓰일거라 생각돼서 a로 지음)-->
    <a href="https://www.google.com">링크 ໒꒰ྀི ˶> ˕ <˶꒱ྀི১< /a>
            <br />
            <!---페이지 내에 창을 만들고 그 안에서 창을 여는 용도. Youtube같은 영상 넣을때 잘 씀.-->
            <!--예전에는 아이프레임 창 안에서 네이버 등 사이트 전체를 열 수 있었는데, 피싱 등에 악용되어 대부분 막혀있음-->
            <iframe width="560" height="315" src="https://www.youtube.com/embed/FcMaC8akSU8?si=p5x_FZrgPDHoR_ej"
                title="YouTube video player" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <p><iframe src="https://www.youtube.com/embed/Qz95ctZk3ks" title="[리센느] 미나미의 파라파라 댄스 #리센느" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen style="width: 100%; max-width: 360px; aspect-ratio: 9 / 16; border-radius: 12px;">
                </iframe>

</body>

</html>
