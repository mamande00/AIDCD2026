<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike 회원가입 실습 2</title>
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

        body {
            font-family: 'Pretendard', 'Noto Sans KR', 'sans-serif';
            letter-spacing: -5%;
        }
        .main{display:flex;
        top:20px;
    justify-content:center;
}

        .join {
            width: 400px;
            text-align: center;
        }

        .logo {
            display:flex;
            justify-content:center;
            width: 100%;
            height: 80px;
        }

        .logo img {
            width: 100%;
        }

        .title {
            margin-top: 10px;
            font-size: 20px;
            font-weight: 700;
        }

        .desc {
            margin-top: 10px;
            font-size: 16px;
            color: gray;
            font-weight: 500;
            line-height: 22px;
        }

        .sns_section button {
            margin-top: 15px;
            width: 100%;
            height: 50px;
            border-radius: 0;
            border: none;
            box-sizing: border-box;

        }

        .sns_section .kakao_bt {
            background: #FEE500;
            color: #191919;
            font-size: 16px;
            font-weight: 500;
        }

        .sns_section .facebook_bt {
            margin-top: 10px;
            background: #1877F2;
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        .input_items input {
            margin-top: 10px;
            padding: 12px 10px;
            height: 50px;
            width: 100%;
            font-size: 14px;
            box-sizing: border-box;

        }

        .input_items select {
            margin-top: 10px;
            height: 50px;
            width: 100%;
            font-size: 14px;
            padding: 12px 10px;
            box-sizing: border-box;
            background-color: #ffffff;
            border: lightgray solid 0.5px;
            appearance: none;
        }
        .input_items select option{
            padding: 12px 10px;
        }

        .agree_section {
            margin-top: 10px;
            margin-bottom: 10px;
            height: 20px;
            font-size: 16px;
            font-weight: 400;
            text-align: center;
        }

        .agree_section input[type="checkbox"] {
            height: 16px;
            width: 16px;
            vertical-align: middle;
        }

        .join_bt {
            font-size: 16px;
            font-weight: 400;
            color: white;
            background-color: black;
            width: 100%;
            height: 50px;
            border-radius: 0;
            border: none;
            box-sizing: border-box;

        }
    </style>
</head>

<body>
    <div class="main">
    <div class="join">
        <div class="logo">
            <img src="img/logo_NIKE.svg" />
        </div>
        <div class="title">나이키 회원가입
        </div>
        <div class="desc">멤버가 되어 나이키가 제공하는
            <br />최고의 제품과 혜택을 만나보세요
        </div>

        <div class="sns_section">
            <button class="kakao_bt">카카오톡 로그인</button><br />
            <button class="facebook_bt">페이스북 로그인</button>
        </div>
        <div class="input_items">
            <select name="성별">
                <option>남자</option>
                <option>여자</option>
                <option>그 외</option>
            </select></br>
            <input type="text" placeholder="아이디" /></br>
            <input type="password" placeholder="비밀번호" /></br>
            <input type="password" placeholder="비밀번호 확인"></br>
            <input type="text" placeholder="이름" /></br>
            <input type="tel" placeholder="휴대폰번호" /></br>

        </div>
        <div class="agree_section">
            <label><input type="checkbox" /> 동의합니다.</label>
        </div>
        <button class="join_bt">회원가입</button>
    </div>
    </div>
</div>
</body>

</html>
