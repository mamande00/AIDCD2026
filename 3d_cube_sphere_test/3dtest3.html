<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 물리 큐브 시뮬레이션 (Real-time ASCII Art)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #F2F2F2; }
        canvas { display: block; }
        #info {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: #1e1e1e; font-family: monospace; pointer-events: none;
            user-select: none; z-index: 10; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="info">REAL-TIME ASCII SHADER ENABLED (SAFEWORD: ROLLBACK)</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>

    <script>
        const BALL_COUNT = 150;
        const CUBE_SIZE = 8;

        let scene, camera, renderer, composer;
        let world;
        
        let visualContainer; 
        let physicsContainerBody;

        const ballsVisual = [];
        const ballsPhysical = [];

        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        
        let rotationX = 0.5;
        let rotationY = 0.5;
        let clock;
        let asciiPass;

        // 🔥 고성능 실시간 ASCII 변환 셰이더
        const AsciiShader = {
            uniforms: {
                "tDiffuse": { value: null },
                "uResolution": { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                "uCharSize": { value: new THREE.Vector2(8.0, 14.0) } // 글자 크기 (가로 8px, 세로 14px 격자)
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform vec2 uResolution;
                uniform vec2 uCharSize;
                varying vec2 vUv;

                // 셰이더 내에서 픽셀 격자 안에 pseudo-character(글자 모양 바이트)를 그리는 함수
                float getChar(int charIndex, vec2 f) {
                    // 단색 및 기호 형태를 격자 내부에서 수학적으로 마스킹
                    if (charIndex == 0) return 0.0; // 공백 (가장 어두움)
                    if (charIndex == 1) return (f.x > 0.4 && f.x < 0.6 && f.y > 0.4 && f.y < 0.6) ? 1.0 : 0.0; // .
                    if (charIndex == 2) return (abs(f.x - 0.5) < 0.1 || abs(f.y - 0.5) < 0.1) ? 1.0 : 0.0; // +
                    if (charIndex == 3) return (f.x > 0.2 && f.x < 0.8 && f.y > 0.2 && f.y < 0.8 && (abs(f.x-0.5) > 0.2 || abs(f.y-0.5) > 0.2)) ? 1.0 : 0.0; // *
                    if (charIndex == 4) return (f.x > 0.1 && f.x < 0.9 && f.y > 0.1 && f.y < 0.9) ? 1.0 : 0.0; // # (가장 밝음)
                    return 0.0;
                }

                void main() {
                    // 현재 스크린 좌표를 텍스트 격자 단위로 나눔
                    vec2 textCoords = vUv * uResolution;
                    vec2 cellIdx = floor(textCoords / uCharSize);
                    vec2 cellUv = fract(textCoords / uCharSize); // 하나의 글자 칸 내부의 0~1 좌표

                    // 격자 중심부의 원래 화면 색상을 샘플링
                    vec2 sampleUv = (cellIdx * uCharSize + uCharSize * 0.5) / uResolution;
                    vec4 color = texture2D(tDiffuse, sampleUv);

                    // 밝기(Luminance) 계산
                    float gray = dot(color.rgb, vec3(0.299, 0.587, 0.114));

                    // 배경색(0xF2F2F2) 인지를 판별하여 배경은 공백 처리
                    // 오리지널 배경색의 gray 값은 약 0.95입니다.
                    int charIdx = 0;
                    if (gray < 0.92) {
                        if (gray > 0.7) charIdx = 1;      // '.'
                        else if (gray > 0.5) charIdx = 2; // '+'
                        else if (gray > 0.3) charIdx = 3; // '*'
                        else charIdx = 4;                 // '#'
                    }

                    float charMask = getChar(charIdx, cellUv);

                    // 글자가 그려질 부분(1.0)은 원래 구슬/선 색상을 입히고, 배경(0.0)은 원래 배경색(F2F2F2) 처리
                    if (charIdx == 0) {
                        gl_FragColor = vec4(0.95, 0.95, 0.95, 1.0); // 깔끔한 기본 배경 유지
                    } else {
                        // 캐릭터 선에 원래 구슬의 비비드한 오렌지나 검은 선 컬러를 투영
                        vec3 finalColor = mix(vec3(0.95), color.rgb, charMask * 1.3);
                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                }
            `
        };

        initPhysics();
        initGraphics();
        createObjects();
        initPostProcessing(); // ASCII 셰이더 연결
        animate();

        function initPhysics() {
            world = new CANNON.World();
            world.gravity.set(0, -35, 0); 
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 12;

            const defaultMaterial = new CANNON.Material("default");
            const contactMaterial = new CANNON.ContactMaterial(defaultMaterial, defaultMaterial, {
                friction: 0.3,
                restitution: 0.05 
            });
            world.addContactMaterial(contactMaterial);
        }

        function initGraphics() {
            scene = new THREE.Scene();
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 17); 
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setClearColor(0xF2F2F2, 1);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', () => isDragging = true);
            document.addEventListener('mouseup', () => isDragging = false);
            document.addEventListener('mousemove', handleMouseMove);
        }

        function initPostProcessing() {
            composer = new THREE.EffectComposer(renderer);
            
            const renderPass = new THREE.RenderPass(scene, camera);
            composer.addPass(renderPass);
            
            asciiPass = new THREE.ShaderPass(AsciiShader);
            composer.addPass(asciiPass);
        }

        function createObjects() {
            visualContainer = new THREE.Group();
            scene.add(visualContainer);

            const cubeGeo = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);
            const edgeGeo = new THREE.EdgesGeometry(cubeGeo);
            const lineMat = new THREE.LineBasicMaterial({ 
                color: 0x1e1e1e, 
                linewidth: 2,
                transparent: false,
                depthTest: true,
                depthWrite: true 
            });
            const cubeLines = new THREE.LineSegments(edgeGeo, lineMat);
            
            cubeLines.renderOrder = 0; 
            visualContainer.add(cubeLines);

            physicsContainerBody = new CANNON.Body({
                mass: 0, 
                position: new CANNON.Vec3(0, 0, 0)
            });

            const half = CUBE_SIZE / 2;
            const planeShape = new CANNON.Plane();

            const walls = [
                { pos: [0, -half, 0], rot: [-Math.PI / 2, 0, 0] },
                { pos: [0, half, 0], rot: [Math.PI / 2, 0, 0] },
                { pos: [-half, 0, 0], rot: [0, Math.PI / 2, 0] },
                { pos: [half, 0, 0], rot: [0, -Math.PI / 2, 0] },
                { pos: [0, 0, -half], rot: [0, 0, 0] },
                { pos: [0, 0, half], rot: [Math.PI, 0, 0] }
            ];

            walls.forEach(w => {
                const localPos = new CANNON.Vec3(...w.pos);
                const localQuat = new CANNON.Quaternion();
                localQuat.setFromEuler(...w.rot);
                physicsContainerBody.addShape(planeShape, localPos, localQuat);
            });
            
            world.addBody(physicsContainerBody);

            const ballRadius = 0.3;
            const ballGeo = new THREE.SphereGeometry(ballRadius, 24, 24);

            const ballMat = new THREE.MeshBasicMaterial({ 
                color: 0xEA5C2A,
                transparent: true,
                opacity: 0.9,              
                depthTest: true,           
                depthWrite: false,          
                blending: THREE.CustomBlending,
                blendEquation: THREE.AddEquation,
                blendSrc: THREE.SrcAlphaFactor, 
                blendDst: THREE.OneMinusSrcAlpha
            });

            for (let i = 0; i < BALL_COUNT; i++) {
                const ballMesh = new THREE.Mesh(ballGeo, ballMat);
                ballMesh.renderOrder = 1; 
                scene.add(ballMesh);
                ballsVisual.push(ballMesh);

                const ballShape = new CANNON.Sphere(ballRadius); 
                const ballBody = new CANNON.Body({
                    mass: 8, 
                    shape: ballShape,
                    position: new CANNON.Vec3(
                        (Math.random() - 0.5) * (CUBE_SIZE - 2.5),
                        (Math.random() - 0.5) * (CUBE_SIZE - 2.0),
                        (Math.random() - 0.5) * (CUBE_SIZE - 2.5)
                    )
                });
                
                ballBody.linearDamping = 0.25; 
                ballBody.angularDamping = 0.25;

                world.addBody(ballBody);
                ballsPhysical.push(ballBody);
            }
        }

        function handleMouseMove(e) {
            if (isDragging) {
                const deltaX = e.offsetX - previousMousePosition.x;
                const deltaY = e.offsetY - previousMousePosition.y;

                rotationY += deltaX * 0.007;
                rotationX += deltaY * 0.007;
            }
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            world.step(1 / 60);

            if (!isDragging) {
                rotationX += ((2 * Math.PI) / 10) * delta; 
                rotationY += ((2 * Math.PI) / 40) * delta; 
            }

            const quatX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), rotationX);
            const quatY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), rotationY);
            const combinedQuat = new THREE.Quaternion().multiplyQuaternions(quatY, quatX);

            visualContainer.quaternion.copy(combinedQuat);
            physicsContainerBody.quaternion.copy(combinedQuat);

            for (let i = 0; i < BALL_COUNT; i++) {
                ballsVisual[i].position.copy(ballsPhysical[i].position);
            }

            composer.render(); // ASCII 필터 레이어로 최종 출력
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            if(asciiPass) {
                asciiPass.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
            }
        }
    </script>
</body>
</html>
