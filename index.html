<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDCD2026 HTML+CSS</title>
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");
        * { box-sizing: border-box; }
        body { margin: 0; padding: 40px 20px; font-family: 'Pretendard', sans-serif; background: #f7f7f7; color: #111; }
        main { max-width: 720px; margin: 0 auto; }
        .header-wrap { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        h1 { margin: 0 0 8px; font-size: 28px; font-weight: 700; }
        .intro { margin: 0; color: #666; }
        
        /* 정렬 버튼 스타일 */
        .sort-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 13px; font-weight: 600; color: #555; background: #fff; border: 1px solid #e5e5e5; border-radius: 6px; cursor: pointer; }
        .date-group + .date-group { margin-top: 40px; }
        h2 { margin: 0 0 12px; font-size: 15px; font-weight: 600; color: #888; letter-spacing: 0.02em; }
        ul { margin: 0; padding: 0; list-style: none; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; }
        li + li { border-top: 1px solid #eee; }
        a { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 16px; color: #111; text-decoration: none; }
        a:hover { background: #fafafa; }
        
        /* ⭐ 불러온 title 안의 내용 두께를 500으로 지정 */
        .practice { flex: 1; color: #555; font-size: 14px; font-weight: 500; }
        .file { flex-shrink: 0; font-size: 13px; color: #999; }
        .loading { text-align: center; color: #888; padding: 40px; }
    </style>
</head>
<body>
    <main>
        <div class="header-wrap">
            <div>
                <h1>AIDCD2026 HTML+CSS</h1>
                <p class="intro">프로젝트에 포함된 HTML 페이지 목록입니다.</p>
            </div>
            <!-- 초기 상태를 '최신순'으로 세팅 -->
            <button id="sortBtn" class="sort-btn">정렬: <span>최신순</span> ⇅</button>
        </div>

        <div id="contentsContainer">
            <div class="loading">파일 목록 및 제목을 불러오는 중입니다...</div>
        </div>
    </main>

    <script>
        const USERNAME = 'mamande00';
        const REPO = 'AIDCD2026';
        
        const container = document.getElementById('contentsContainer');
        const sortBtn = document.getElementById('sortBtn');
        
        // ⭐ 페이지 로드 시 기본 상태를 'desc' (최신순)로 설정
        let currentOrder = 'desc'; 
        let groupedData = {};

        function extractTitle(htmlText, defaultName) {
            const doc = new DOMParser().parseFromString(htmlText, 'text/html');
            const titleTag = doc.querySelector('title');
            return titleTag && titleTag.innerText.trim() ? titleTag.innerText.trim() : defaultName.replace('.html', '');
        }

        async function parseAndFetchTitles(files) {
            const groups = {};
            
            const promises = files.map(async (file) => {
                if (file.name === 'index.html' || file.name.startsWith('.')) return;

                let groupName = '기타';
                let displayName = file.name.replace('.html', '');
                let isHTML = file.name.endsWith('.html');

                if (file.type === 'dir') {
                    groupName = file.name;
                    displayName = `[폴더] ${file.name}`;
                } else if (isHTML) {
                    const dateMatch = file.name.match(/^(\d{4})(\d{2})(\d{2})/);
                    if (dateMatch) {
                        groupName = `${dateMatch[1]}.${dateMatch[2]}.${dateMatch[3]}`;
                    }

                    try {
                        const response = await fetch(`https://${USERNAME}.github.io/${REPO}/${file.path}`);
                        if (response.ok) {
                            const htmlText = await response.text();
                            displayName = extractTitle(htmlText, file.name);
                        }
                    } catch (e) {
                        console.error(`${file.name}의 제목을 가져오지 못했습니다.`, e);
                    }
                } else {
                    return;
                }

                if (!groups[groupName]) groups[groupName] = [];
                groups[groupName].push({
                    name: displayName,
                    path: file.type === 'dir' ? `${file.path}/` : file.path
                });
            });

            await Promise.all(promises);
            return groups;
        }

        function render(groups) {
            container.innerHTML = '';
            const keys = Object.keys(groups);
            const dateKeys = keys.filter(k => /^\d{4}\.\d{2}\.\d{2}$/.test(k));
            const fixedKeys = keys.filter(k => !/^\d{4}\.\d{2}\.\d{2}$/.test(k));

            // ⭐ 정렬 방향에 따라 텍스트를 "현재 적용된 방식"으로 직관적으로 표시
            if (currentOrder === 'desc') {
                dateKeys.sort((a, b) => b.localeCompare(a)); // 최신순 (내림차순)
                sortBtn.querySelector('span').innerText = '최신순';
            } else {
                dateKeys.sort((a, b) => a.localeCompare(b)); // 날짜순 (오름차순)
                sortBtn.querySelector('span').innerText = '날짜순';
            }

            const finalKeys = [...dateKeys, ...fixedKeys];

            finalKeys.forEach(key => {
                const section = document.createElement('section');
                section.className = 'date-group';
                
                let listItems = groups[key].map(file => `
                    <li>
                        <a href="${file.path}">
                            <span class="practice">${file.name}</span>
                            <span class="file">${file.path}</span>
                        </a>
                    </li>
                `).join('');

                section.innerHTML = `
                    <h2>${key}</h2>
                    <ul>${listItems}</ul>
                `;
                container.appendChild(section);
            });
        }

        fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents`)
            .then(res => res.json())
            .then(async (data) => {
                if (Array.isArray(data)) {
                    groupedData = await parseAndFetchTitles(data);
                    render(groupedData);
                }
            })
            .catch(err => {
                container.innerHTML = '<div class="loading">목록을 불러오는 데 실패했습니다.</div>';
                console.error(err);
            });

        // 버튼 클릭 시 토글 동작
        sortBtn.addEventListener('click', () => {
            currentOrder = currentOrder === 'desc' ? 'asc' : 'desc';
            render(groupedData);
        });
    </script>
</body>
</html>
