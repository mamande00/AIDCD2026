<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20260629</title>
    <style>
        .st1 {

            color: red;
        }

        #stylesample2 {
            color: aqua
        }

        #stylesample3 {
            color: blueviolet
        }

        .box {
            width: 100px;
            height: 100px;
            border: 15px solid slateblue;

            margin: 5px;
            padding: 5px;
            box-sizing:border-box
        }
    </style>
    <!--기본적으로 보더 설정은 바깥이기때문에 100px에 보더 2px이면 상하좌우로 2px 늘어남-->
    <!--박스 바깥의 여백-->
    <!--박스 안의 여백, width와 height에 더해짐-->
    <!--border-box를 사용하면 선이 안쪽에 올수있음-->
    <!-- 
  [CSS 꿀팁] box-sizing: border-box 작동 방식
  - border와 padding 모두 지정한 너비(width/height) '안쪽'으로 포함됩니다.
  - padding을 추가해도 박스 전체 크기가 커지지 않고, 내부 콘텐츠 공간이 줄어듭니다.

  예시 (width: 200px, padding: 20px, border: 10px 설정 시):
  - 전체 너비: 200px 유지
  - 실제 콘텐츠 공간: 200px - 40px(좌우 패딩) - 20px(좌우 테두리) = 140px
-->

    <!--st1는 클래스이름,앞에 점(.) 있어야 구분가능-->
    <!--id앞에는 # 붙임-->
    <!--class와 id가 둘 다 있을때에는 id가 우선-->
</head>

<body>
    <div class="box">this text is inside the box</div>

    <div>
        <input type="text" placeholder="이름을 입력해주세요." />
        <input type="password" placeholder="비밀번호를 입력해주세요." />
        <input type="email" placeholder="이메일을 입력해주세요." />
        <input type="tel" placeholder="전화번호를 입력해주세요." />
        <input type="date" placeholder="생년월일을 입력해주세요." />
        <input type="time" placeholder="시간을 입력해주세요." />
        <input type="datetime-local" placeholder="날짜와 시간을 입력해주세요." />
        <input type="file" placeholder="파일을 선택해주세요." />

        <input type="checkbox" placeholder="동의합니다." /> <!--체크박스는 여러개 선택 가능-->
        <input type="radio" placeholder="동의합니다." name="radio" /> <!--라디오버튼은 같은 name 속성을 가지는 것 중 하나만 선택 가능-->
        <label><input type="radio" name="grade" id="1st" />
            1학년</label><br /><!--id는 중복되지 않는 고유한 값, label은 체크박스와 연결되는 텍스트-->
        <label><input type="radio" name="grade" id="2nd" /> 2학년</label><br />
        <label><input type="radio" name="grade" id="3rd" /> 3학년</label><br />
        <label><input type="radio" name="grade" id="4th" /> 4학년</label><br />
        <label><input type="radio" name="grade" id="5th" /> 5학년</label><br />
        <label><input type="radio" name="grade" id="6th" /> 6학년</label><br />

        <input type="textarea" placeholder="서술형 내용을 입력해주세요." />

        <!--주소 입력: 국가 → 지역 → 도시 → 상세 주소 순서-->
        <input type="text" name="country" placeholder="국가 (예: 대한민국)" autocomplete="country-name" />
        <input type="text" name="region" placeholder="지역 (예: 서울특별시, 경기도)" autocomplete="address-level1" />
        <input type="text" name="city" placeholder="도시 (예: 강남구, 수원시)" autocomplete="address-level2" />
        <input type="text" name="address" placeholder="상세 주소 (예: 테헤란로 123, 4층)" autocomplete="street-address" />

    </div> <!--div는 묶어서 꾸미는 용도, 줄이 바뀜-->

    <div class="st1">스타일 샘플 1</div>
    <!--class가 이름이라면 (동명이인 가능) id는 주민번호(고유한 값)한 페이지에 단 하나만 존재 가능-->
    <!--실무에서 id보단 클래스를 더 많이 씀-->
    <div id="stylesample2">스타일 샘플 2</div>
    <div class="st1" id="stylesample3">스타일 샘플 3</div>





</body>

</html>
